- hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Import VPC variables
      include_vars: vars/vpc_setup

    - name: Create vprofile VPC
      ec2_vpc_net:
        name: "{{vpc_name}}"
        cidr_block: "{{vpcCidr}}"
        region: "{{region}}"
        dns_support: yes
        dns_hostnames: yes
        tenancy: default
        state: "{{state}}"
      register: vpcout

    - debug:
        var: vpcout

    - name: Create Public Subnet 1 in Zone1
      ec2_vpc_subnet:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        az: "{{ zone1 }}"
        state: "{{ state }}"
        cidr: "{{ PubSub1Cidr }}"
        map_public: yes
        resource_tags:
          Name: vprofile-pubsub1
      register: pubsub1_out

    - name: Create Public Subnet 2 in Zone2
      ec2_vpc_subnet:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        az: "{{ zone2 }}"
        state: "{{ state }}"
        cidr: "{{ PubSub2Cidr }}"
        map_public: yes
        resource_tags:
          Name: vprofile-pubsub2
      register: pubsub2_out

    - name: Create Public Subnet 3 in Zone3
      ec2_vpc_subnet:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        az: "{{ zone3 }}"
        state: "{{ state }}"
        cidr: "{{ PubSub3Cidr }}"
        map_public: yes
        resource_tags:
          Name: vprofile-pubsub3
      register: pubsub3_out

    - name: Create Private Subnet 1 in Zone1
      ec2_vpc_subnet:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        az: "{{ zone1 }}"
        state: "{{ state }}"
        cidr: "{{ PrivSub1Cidr }}"
        resource_tags:
          Name: vprofile-privsub1
      register: privsub1_out

    - name: Create Private Subnet 2 in Zone2
      ec2_vpc_subnet:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        az: "{{ zone2 }}"
        state: "{{ state }}"
        cidr: "{{ PrivSub2Cidr }}"
        resource_tags:
          Name: vprofile-privsub2
      register: privsub2_out

    - name: Create Private Subnet 3 in Zone3
      ec2_vpc_subnet:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        az: "{{ zone3 }}"
        state: "{{ state }}"
        cidr: "{{ PrivSub3Cidr }}"
        resource_tags:
          Name: vprofile-privsub3
      register: privsub3_out

    - name: Internet Gateway Setup
      ec2_vpc_igw:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        state:  "{{ state }}"
        resource_tags:
          Name: vprofile_IGW
      register: igw_out

    - name: Set up public subnet route table
      ec2_vpc_route_table:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: VProfile-PubRT
        subnets:
          - "{{ pubsub1_out.subnet.id }}"
          - "{{ pubsub2_out.subnet.id }}"
          - "{{ pubsub3_out.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw_out.gateway_id }}"
      register: pubRT_out

    - name: Create NAT gateway in Public Subnet 1
      ec2_vpc_nat_gateway:
        state: "{{ state }}"
        subnet_id: "{{ pubsub1_out.subnet.id }}"
        wait: yes
        region: "{{ region }}"
        if_exist_do_not_create: true
      register: NATGW_out

    - name: Set up private subnet route table
      ec2_vpc_route_table:
        vpc_id: "{{ vpcout.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: VProfile-PrivRT
        subnets:
          - "{{ privsub1_out.subnet.id }}"
          - "{{ privsub2_out.subnet.id }}"
          - "{{ privsub3_out.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            nat_gateway_id: "{{ NATGW_out.nat_gateway_id }}"
      register: privRT_out

    - name: Display created resource IDs
      debug:
        msg: "{{ item }}"
      loop:
        - "VPC ID: {{ vpcout.vpc.id }}"
        - "Public Subnet 1 ID: {{ pubsub1_out.subnet.id }}"
        - "Public Subnet 2 ID: {{ pubsub2_out.subnet.id }}"
        - "Public Subnet 3 ID: {{ pubsub3_out.subnet.id }}"
        - "Private Subnet 1 ID: {{ privsub1_out.subnet.id }}"
        - "Private Subnet 2 ID: {{ privsub2_out.subnet.id }}"
        - "Private Subnet 3 ID: {{ privsub3_out.subnet.id }}"
        - "Internet Gateway ID: {{ igw_out.gateway_id }}"
        - "Public Route Table ID: {{ pubRT_out.route_table.id }}"
        - "NAT Gateway ID: {{ NATGW_out.nat_gateway_id }}"
        - "Private Route Table ID: {{ privRT_out.route_table.id }}"
    - name: Set facts for created resource IDs
      set_fact:
        vpcid: "{{ vpcout.vpc.id }}"
        pubsub1_id: "{{ pubsub1_out.subnet.id }}"
        pubsub2_id: "{{ pubsub2_out.subnet.id }}"
        pubsub3_id: "{{ pubsub3_out.subnet.id }}"
        privsub1_id: "{{ privsub1_out.subnet.id }}"
        privsub2_id: "{{ privsub2_out.subnet.id }}"
        privsub3_id: "{{ privsub3_out.subnet.id }}"
        igw_id: "{{ igw_out.gateway_id }}"
        pubrt_id: "{{ pubRT_out.route_table.id }}"
        natgw_id: "{{ NATGW_out.nat_gateway_id }}"
        privrt_id: "{{ privRT_out.route_table.id }}"
        cacheable: true

    - name: Create variable file for VPC output
      copy:
        dest: vars/output_vars
        content: |
          vpcid: "{{ vpcid }}"
          pubsub1_id: "{{ pubsub1_id }}"
          pubsub2_id: "{{ pubsub2_id }}"
          pubsub3_id: "{{ pubsub3_id }}"
          privsub1_id: "{{ privsub1_id }}"
          privsub2_id: "{{ privsub2_id }}"
          privsub3_id: "{{ privsub3_id }}"
          igw_id: "{{ igw_id }}"
          pubrt_id: "{{ pubrt_id }}"
          natgw_id: "{{ natgw_id }}"
          privrt_id: "{{ privrt_id }}"
          
        
